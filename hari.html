<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tables and Nested Lists</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 20px;
        padding: 20px;
    }

    .container {
        width: 80%;
        margin: auto;
        background: white;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 8px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }

    table, th, td {
        border: 1px solid #444;
    }

    th, td {
        padding: 10px;
        text-align: left;
    }

    th {
        background-color: #ddd;
    }

    ul {
        margin: 10px 0;
        padding-left: 20px;
    }

    li {
        margin: 5px 0;
    }

    button {
        padding: 10px 15px;
        border: none;
        background-color: #333;
        color: white;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background-color: #555;
    }

    #message {
        margin-top: 15px;
        padding: 10px;
        border: 1px solid #999;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Student Information</h1>

    <table>
        <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Year</th>
        </tr>
        <tr>
            <td>mugipandi</td>
            <td>B.Techcvil</td>
            <td>2nd Year</td>
        </tr>
        <tr>
            <td>naraghu</td>
            <td>BA.english literature</td>
            <td>1st Year</td>
        </tr>
       
            </table>

    <h2>Courses</h2>
    <ul>
        <li>Computer Science
            <ul>
                <li>Programming in C</li>
                <li>Database Management</li>
            </ul>
        </li>
        <li>English
            <ul>
                <li>Grammar</li>
                <li>Communication Skills</li>
            </ul>
        </li>
    </ul>

    <button onclick="showMessage()">Click Here</button>
    <div id="message">Message will appear here.</div>
</div>

<script>
function showMessage() {
    document.getElementById("message").innerHTML =
        "Welcome! This webpage uses tables, nested lists, CSS styling, and JavaScript.";
}
</script>

</body>
</html>
