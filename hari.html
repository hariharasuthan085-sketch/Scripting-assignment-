<!DOCTYPE html>
<html>
<head>
    <title>Largest of Two Numbers</title>
</head>
<body>
    <h2>Find the Largest of Two Numbers</h2>

    <label>Enter first number:</label>
    <input type="number" id="num1"><br><br>

    <label>Enter second number:</label>
    <input type="number" id="num2"><br><br>

    <button onclick="findLargest()">Check</button>

    <p id="result1"></p>
    <p id="result2"></p>

    <script>
        // Normal function
        function largestNumber(a, b) {
            return (a > b) ? a : b;
        }

        // Arrow function
        const largestArrow = (a, b) => (a > b) ? a : b;

        function findLargest() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);

            document.getElementById("result1").innerHTML =
                "Largest using normal function: " + largestNumber(n1, n2);

            document.getElementById("result2").innerHTML =
                "Largest using arrow function: " + largestArrow(n1, n2);
        }
    </script>
</body>
</html>
